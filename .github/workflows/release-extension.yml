name: Release Chrome Extension

on:
  push:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release metadata
        id: release_meta
        shell: python
        run: |
          import subprocess
          import os
          from datetime import datetime
          
          # Get commit message
          result = subprocess.run(['git', 'log', '-1', '--pretty=%B'], capture_output=True, text=True)
          commit_msg = result.stdout.strip()
          
          # Check if starts with rocket emoji
          if commit_msg.startswith('🚀'):
            channel = 'stable'
            tag = 'stable'
            release_name = 'Stable Release'
            prerelease = 'false'
          else:
            timestamp = datetime.utcnow().strftime('%Y%m%d-%H%M%S')
            short_sha = os.environ['GITHUB_SHA'][:7]
            channel = 'nightly'
            tag = f'nightly-{timestamp}-{short_sha}'
            release_name = f'Nightly {timestamp} ({short_sha})'
            prerelease = 'true'
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'channel={channel}\n')
            f.write(f'tag={tag}\n')
            f.write(f'release_name={release_name}\n')
            f.write(f'prerelease={prerelease}\n')

      - name: Build extension package
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          zip -r "dist/hctgplus-${{ steps.release_meta.outputs.channel }}.zip" \
            manifest.json \
            content.js \
            service-worker.js \
            snippet.html \
            components

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: dist/hctgplus-${{ steps.release_meta.outputs.channel }}.zip
          generateReleaseNotes: true
          makeLatest: ${{ steps.release_meta.outputs.channel == 'stable' && 'true' || 'false' }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          removeArtifacts: true
          tag: ${{ steps.release_meta.outputs.tag }}
