name: Release Chrome Extension

on:
  push:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          
          # Git config for UTF-8
          git config --global core.quotepath false
          
          # Get commit message and ensure it's UTF-8
          COMMIT_MSG=$(git log -1 --pretty=%B | iconv -f ISO-8859-1 -t UTF-8 2>/dev/null || git log -1 --pretty=%B)
          
          # Check if starts with rocket emoji
          if [[ "$COMMIT_MSG" == 🚀* ]]; then
            echo "channel=stable" >> "${GITHUB_OUTPUT}"
            echo "tag=stable" >> "${GITHUB_OUTPUT}"
            echo "release_name=Stable Release" >> "${GITHUB_OUTPUT}"
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          else
            TIMESTAMP="$(date -u +'%Y%m%d-%H%M%S')"
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "channel=nightly" >> "${GITHUB_OUTPUT}"
            echo "tag=nightly-${TIMESTAMP}-${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
            echo "release_name=Nightly ${TIMESTAMP} (${SHORT_SHA})" >> "${GITHUB_OUTPUT}"
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build extension package
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          zip -r "dist/hctgplus-${{ steps.release_meta.outputs.channel }}.zip" \
            manifest.json \
            content.js \
            service-worker.js \
            snippet.html \
            components

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: dist/hctgplus-${{ steps.release_meta.outputs.channel }}.zip
          generateReleaseNotes: true
          makeLatest: ${{ steps.release_meta.outputs.channel == 'stable' && 'true' || 'false' }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          removeArtifacts: true
          tag: ${{ steps.release_meta.outputs.tag }}
