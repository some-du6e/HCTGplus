name: Release Chrome Extension

on:
  push:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release metadata
        id: release_meta
        shell: node {0}
        run: |
          const fs = require('fs');
          const { execSync } = require('child_process');
          const path = require('path');
          
          const commitMsg = execSync('git log -1 --pretty=%B', { encoding: 'utf8' }).trim();
          
          let channel, tag, release_name, prerelease;
          
          if (commitMsg.startsWith('🚀')) {
            channel = 'stable';
            tag = 'stable';
            release_name = 'Stable Release';
            prerelease = 'false';
          } else {
            const date = new Date();
            const timestamp = date.getUTCFullYear() + 
              String(date.getUTCMonth() + 1).padStart(2, '0') +
              String(date.getUTCDate()).padStart(2, '0') + '-' +
              String(date.getUTCHours()).padStart(2, '0') +
              String(date.getUTCMinutes()).padStart(2, '0') +
              String(date.getUTCSeconds()).padStart(2, '0');
            const shortSha = process.env.GITHUB_SHA.substring(0, 7);
            channel = 'nightly';
            tag = `nightly-${timestamp}-${shortSha}`;
            release_name = `Nightly ${timestamp} (${shortSha})`;
            prerelease = 'true';
          }
          
          const output = `channel=${channel}\ntag=${tag}\nrelease_name=${release_name}\nprerelease=${prerelease}\n`;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, output);
          
          console.log(`Detected: ${commitMsg.substring(0, 50)}`);
          console.log(`Channel: ${channel}`);


      - name: Build extension package
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          zip -r "dist/hctgplus-${{ steps.release_meta.outputs.channel }}.zip" \
            manifest.json \
            content.js \
            service-worker.js \
            snippet.html \
            components

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: dist/hctgplus-${{ steps.release_meta.outputs.channel }}.zip
          generateReleaseNotes: true
          makeLatest: ${{ steps.release_meta.outputs.channel == 'stable' && 'true' || 'false' }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          removeArtifacts: true
          tag: ${{ steps.release_meta.outputs.tag }}
